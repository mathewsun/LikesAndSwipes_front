<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Likes And Swipes - Onboarding</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <main class="container">
    
    <!-- Logo -->
    <div class="logo">
      <div class="logo-circle">
        ❤️
      </div>
      <h1>Likes And Swipes</h1>
      <p class="subtitle">Let's create your profile</p>
    </div>

    <!-- Card -->
    <section class="card">

	  <!-- Progress -->
	  <div class="progress">
		<div class="progress-bar" data-step="1"></div>
		<div class="progress-bar" data-step="2"></div>
		<div class="progress-bar" data-step="3"></div>
		<div class="progress-bar" data-step="4"></div>
	  </div>

	  <p class="step-text">Step <span id="currentStep">1</span> of 4</p>

	  <!-- Step 1 -->
	  <div class="form-step active" data-step="1">
		<h2>What's your name?</h2>
		<input type="text" id="firstName" placeholder="Enter your first name" />
		<button class="btn-primary next-btn">Continue</button>
	  </div>

	  <!-- Step 2 -->
	  <div class="form-step" data-step="2">
		<h2>How old are you?</h2>
		<input 
		  type="number" 
		  id="age" 
		  placeholder="Enter your age"
		  min="18"
		  max="100"
		/>

		<div class="button-row">
		  <button class="btn-secondary back-btn">Back</button>
		  <button class="btn-primary next-btn">Continue</button>
		</div>
	  </div>

	</section>

  </main>

  <script src="script.js"></script>
</body>
</html>
