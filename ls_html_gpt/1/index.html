<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Likes And Swipes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <span class="logo-text">LikesAndSwipes</span>
      <a href="#">Home</a>
      <a href="#">Privacy</a>
    </div>
    <div class="nav-right">
      <a href="#">Register</a>
      <a href="#">Login</a>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- Logo + Title -->
    <div class="branding">
      <div class="logo-circle">❤️</div>
      <h1>Likes And Swipes</h1>
      <p>Let's create your profile</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Progress -->
      <div class="progress">
        <div class="progress-bar active"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
      </div>

      <span class="step-text">Step 1 of 5</span>

      <h2>What's your name?</h2>

      <input 
        type="text" 
        id="nameInput" 
        placeholder="Enter your first name"
      >

      <button id="continueBtn" class="btn-primary">
        Continue
      </button>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    © 2026 - LikesAndSwipes - <a href="#">Privacy</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
