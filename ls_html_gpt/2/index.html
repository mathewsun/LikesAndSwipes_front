<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Likes And Swipes - Step 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="nav-left">
      <span class="logo-text">LikesAndSwipes</span>
      <a href="#">Home</a>
      <a href="#">Privacy</a>
    </div>
    <div class="nav-right">
      <a href="#">Register</a>
      <a href="#">Login</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- Branding -->
    <div class="branding">
      <div class="logo-circle">❤️</div>
      <h1>Likes And Swipes</h1>
      <p>Let's create your profile</p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Progress -->
      <div class="progress">
        <div class="progress-bar active"></div>
        <div class="progress-bar active"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
        <div class="progress-bar"></div>
      </div>

      <span class="step-text">Step 2 of 5</span>

      <h2>How old are you?</h2>

      <input 
        type="number" 
        id="ageInput"
        placeholder="Enter your age"
        min="18"
      >

      <div class="button-row">
        <button class="btn-secondary" id="backBtn">Back</button>
        <button class="btn-primary" id="continueBtn">Continue</button>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    © 2026 - LikesAndSwipes - <a href="#">Privacy</a>

  <script src="script.js"></script>
